{% extends 'base.html' %}

{% block content %}
<h2>{{ article.title }}</h2>

<p>{{ article.content }}</p>

<p>
    Автор: {{ article.author.username }}
</p>

<hr>

<form method="post">
    {% csrf_token %}

    <button type="submit" name="action" value="approve">
        Опубликовать
    </button>

    <br><br>

    <textarea
        name="reason"
        placeholder="Причина отклонения"
        rows="4"
        cols="50"
    ></textarea>

    <br><br>

    <button type="submit" name="action" value="reject">
        Отклонить
    </button>
</form>

{% endblock %}
