{% extends 'base.html' %}

{% block content %}
<h2>Создание статьи</h2>

<form method="post">
    {% csrf_token %}

    <input type="text" name="title" placeholder="Заголовок" required>
    <br><br>

    <textarea name="content" rows="10" cols="60" required></textarea>
    <br><br>

    <button type="submit">
        Отправить на модерацию
    </button>
</form>

{% endblock %}
