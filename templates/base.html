{% load static %}

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>News Portal</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav>
    <a href="{% url 'news_list' %}">Новости</a>

    {% if user.is_authenticated %}
        <a href="{% url 'my_articles' %}">Мои статьи</a>

        {% if user.role == 'moderator' %}
            <a href="{% url 'moderation_list' %}">Модерация</a>
        {% endif %}

        <a href="{% url 'logout' %}">Выход</a>
    {% else %}
        <a href="{% url 'login' %}">Вход</a>
    {% endif %}
</nav>

<hr>

<div class="container">

    {% for message in messages %}
    <p>{{ message }}</p>
    {% endfor %}

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
